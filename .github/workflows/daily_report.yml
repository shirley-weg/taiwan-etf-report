name: Generate Daily ETF Report

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 14:45：第一次嘗試，通常是最早合理產出時間
    - cron: "45 14 * * 1-5"
      timezone: "Asia/Taipei"

    # 台灣時間 15:15：資料未齊時的第二次嘗試
    - cron: "15 15 * * 1-5"
      timezone: "Asia/Taipei"

    # 台灣時間 15:45：第三次嘗試
    - cron: "45 15 * * 1-5"
      timezone: "Asia/Taipei"

    # 台灣時間 16:15：最後備援
    - cron: "15 16 * * 1-5"
      timezone: "Asia/Taipei"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    env:
      # 目前先用正式 schema + 範例資料驗證網站。
      # 等你完成 TWSE / TPEx / 投信 PCF adapters 後，改成 "0"。
      USE_SAMPLE_DATA: "1"
      MIN_COVERAGE_RATIO: "0.85"
      ALLOW_PARTIAL_REPORT: "0"
      TOP_N_STOCKS: "10"
      LOG_LEVEL: "INFO"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ETF report JSON
        run: |
          python scripts/generate_report.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_report.json history/*.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update daily ETF report"
          git push
