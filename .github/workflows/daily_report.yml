name: Generate Daily ETF Report

on:
  workflow_dispatch:
  schedule:
    # 台灣每天 18:30 = UTC 10:30
    - cron: "30 10 * * *"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    env:
      TOP_N_STOCKS: "10"
      MIN_TWSE_ETF_MASTER_ROWS: "50"

      # 初期先用 10% 確認 crawler 可以解析真實 PCF。
      # 補齊 data/pcf_source_registry.json 與投信 parser 後，可改成 0.80 或 0.90。
      MIN_PCF_COVERAGE_RATIO: "0.10"
      STRICT_PCF_COVERAGE: "0"

      HTTP_TIMEOUT: "30"
      HTTP_SLEEP_SECONDS: "0.35"
      LOG_LEVEL: "INFO"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ETF report JSON
        run: |
          python scripts/generate_report.py

      - name: Commit and push report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ history/ raw/ || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update ETF PCF holdings report"
          git push
